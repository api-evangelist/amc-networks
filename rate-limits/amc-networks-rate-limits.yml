specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: AMC Networks
providerId: amc-networks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Entertainment
  - Streaming
  - Cable Television
  - Advertising
  - Media
  - FAST Channels
  - Rate Limiting
description: >-
  AMC Networks does not publish public API rate limit documentation. Any partner integrations operate under terms negotiated through the affiliate or advertising sales channels. This artifact remains a scaffold pending publication of public rate limit documentation.
notes: >-
  AMC Networks does not publish a public API developer portal with documented pricing, rate limits, or quotas. Affiliate access is gated via the affiliate portal and Audience+/AMCN Outcomes ad-tech engagements are negotiated per-deal. Reconcile when public API pricing is published.
sources:
  - https://www.amcnetworks.com/
  - https://affiliate.amcnetworks.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Undocumented - bilateral agreement
    scope: contract
    metric: varies
    limit: 'see partner agreement; not publicly documented'
policies:
  - name: Documentation Status
    description: >-
      AMC Networks does not publish public per-second or per-minute API rate
      limits. Throughput, concurrency, and burst behavior are governed by the
      relevant partner, supplier, or merchant agreement.
  - name: Backoff Strategy
    description: >-
      Where any HTTP API is exposed, clients should implement exponential
      backoff with jitter and honor any Retry-After header returned on 429
      or 503 responses.
maintainers:

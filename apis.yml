apis:
  - aid: amc-networks:amc-networks
    name: AMC Networks
    description: >-
      AMC Networks delivers entertainment content through cable networks and
      streaming platforms. Affiliate partners access marketing materials,
      launch documents, and technical resources through the affiliate portal.
      Advertisers engage with AMC Networks through the Audience+ data
      platform and AMCN Outcomes for campaign measurement.
    humanURL: https://www.amcnetworks.com/
    baseURL: https://www.amcnetworks.com
    tags:

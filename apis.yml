aid: amc-networks
name: AMC Networks
description: >-
  AMC Networks is a global entertainment company that owns and operates
  distinctive cable television and streaming brands including AMC, BBC America,
  IFC, Sundance TV, and We TV, as well as the AMC+ streaming service. The
  company operates 33 FAST channels across 22 platforms and delivers digital
  advertising through its Audience+ data platform. AMC Networks provides
  affiliate partnership services, advertising solutions, and streaming content
  distribution through its network of cable and digital properties.

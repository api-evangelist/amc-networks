common:
  - type: Website
    url: https://www.amcnetworks.com/
  - type: Portal
    url: https://affiliate.amcnetworks.com/
  - type: Features
    data:
      - name: Audience+ Data Platform
        description: >-
          Proprietary data platform for creating audience segments and reaching
          viewers across linear and streaming properties with targeted advertising.
      - name: AMCN Outcomes
        description: >-
          First-to-market outcome-based advertising measurement tool enabling
          brands to gauge consumer response to ad spending across AMC Networks
          properties.
      - name: FAST Channels
        description: >-
          33 free ad-supported streaming television channels distributed across
          22 platforms, providing digital advertising inventory.
      - name: AMC+ Streaming
        description: >-
          Subscription streaming service delivering AMC Networks original content,
          international programming, and exclusive series with ad-supported tiers.
      - name: Affiliate Portal
        description: >-
          Partner portal providing marketing materials, key art, promotional
          videos, social toolkits, legal certifications, and technical launch
          documents for cable affiliate partners.
      - name: Contextual AI Advertising
        description: >-
          AI-powered content indexing of AMC Networks' full original content
          library enabling contextual ad placement adjacent to relevant scenes.
  - type: UseCases
    data:
      - name: Cable Affiliate Distribution
        description: >-
          Cable operators access marketing and technical resources for AMC
          Networks channel launches and affiliate partnerships.
      - name: Digital Advertising
        description: >-
          Advertisers reach audiences across AMC Networks' linear and streaming
          properties using Audience+ targeting and AMCN Outcomes measurement.
      - name: Streaming Content Access
        description: >-
          Consumers access AMC Networks content via AMC+ subscription streaming
          and FAST channels on connected TV platforms.
  - type: Integrations
    data:
      - name: Fandango
        description: >-
          AMC Networks expanded its advertising initiative to theatrical
          moviegoing via a partnership with Fandango.
      - name: Runway
        description: >-
          AI partnership with Runway for content creation and advertising
          enhancement capabilities.
